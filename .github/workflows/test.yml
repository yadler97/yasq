name: YASQ CI Test Suite

on:
  push:
    branches: [ main, ci-test ]
  pull_request:
    branches: [ main, ci-test ]

jobs:
  run-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Monorepo Dependencies
      # This cleanly bootstraps all workspaces (client, server, shared) at once
      run: npm ci

    # 1. Run server unit tests via workspace mapping
    - name: Run Unit Tests
      run: npm run test:unit

    # 2. Install Playwright Browsers & OS Dependencies
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    # 3. Run E2E tests using your exact mock script setup
    - name: Run Playwright E2E Tests
      run: npm run test:e2e

    # 4. Upload HTML report if E2E tests fail (targets your custom tests/ directory outputs)
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: tests/playwright-report/ # Double check if your inner playwright config outputs here
        retention-days: 7