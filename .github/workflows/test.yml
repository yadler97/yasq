name: YASQ CI Test Suite

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Run Unit Tests
  run-unit-tests:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Unit Tests
      run: npm run test:unit:coverage

  # Job 2: Run Integration Tests
  run-integration-tests:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Integration Tests
      run: npm run test:integration

  # Job 3: Run Playwright E2E Tests
  run-e2e-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    # This prevents E2E from running (and wasting time) if core unit/integration tests fail
    needs: [ run-unit-tests, run-integration-tests ]

    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --user 1001

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Playwright E2E Tests
      run: npm run test:e2e

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: tests/e2e/playwright-report/
        retention-days: 7